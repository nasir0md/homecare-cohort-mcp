<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#e6edf3;padding:16px;line-height:1.5}
h2{font-size:16px;font-weight:600;color:#f0f6fc}
h3{font-size:13px;font-weight:600;margin:16px 0 6px;color:#c9d1d9;text-transform:uppercase;letter-spacing:.08em}
.subtitle{font-size:12px;color:#8b949e;margin:6px 0 12px}
.header{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.pill{font-size:11px;padding:2px 8px;border-radius:10px;background:#1f3a5f;color:#58a6ff;text-transform:uppercase;letter-spacing:.5px}
.panel{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin-top:10px}
.flags{display:flex;flex-wrap:wrap;gap:6px}
.flag{background:#21262d;color:#c9d1d9;border-radius:10px;padding:4px 10px;font-size:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:6px 8px;border-bottom:1px solid #30363d;text-align:left}
th{color:#c9d1d9;font-weight:600}
.muted{color:#8b949e}
#loading{text-align:center;padding:40px;color:#8b949e}
</style>
</head>
<body>
<div id="loading">Loading profile...</div>
<div id="content" style="display:none">
  <div class="header">
    <h2 id="title"></h2>
    <span class="pill" id="risk-pill"></span>
  </div>
  <div class="subtitle" id="subtitle"></div>
  <div class="panel">
    <h3>Key Clinical Flags</h3>
    <div class="flags" id="flags"></div>
  </div>
  <div class="panel">
    <h3>Recent Labs</h3>
    <div id="labs"></div>
  </div>
  <div class="panel">
    <h3>Recent Medications</h3>
    <div id="meds"></div>
  </div>
  <div class="panel">
    <h3>Recent Encounters</h3>
    <div id="encounters"></div>
  </div>
</div>
<script>
function extractData(payload){
  if(!payload)return null;
  if(typeof payload==="string"){
    try{return extractData(JSON.parse(payload));}catch(_){return null;}
  }
  if(typeof payload!=="object")return null;
  if(payload.structuredContent)return payload.structuredContent;
  if(payload._meta)return extractData(payload._meta);
  if(payload.toolOutput)return extractData(payload.toolOutput);
  if(payload.toolResponseMetadata)return extractData(payload.toolResponseMetadata);
  if(payload.result)return extractData(payload.result);
  if(payload.params)return extractData(payload.params);
  if(payload.arguments)return extractData(payload.arguments);
  if(payload.globals&&payload.globals.toolOutput)return extractData(payload.globals.toolOutput);
  if(payload.jsonrpc||payload.method)return null;
  return payload;
}
function maybeRender(payload){
  var data=extractData(payload);
  if(!data)return false;
  render(data);
  return true;
}
function hydrateFromHost(){
  if(maybeRender(window.openai&&window.openai.toolOutput))return;
  if(maybeRender(window.openai&&window.openai.toolResponseMetadata))return;
  if(maybeRender(window.openai&&window.openai.globals&&window.openai.globals.toolOutput))return;
  var attempts=0;
  var timer=setInterval(function(){
    attempts+=1;
    if(maybeRender(window.openai&&window.openai.toolOutput))return clearInterval(timer);
    if(maybeRender(window.openai&&window.openai.toolResponseMetadata))return clearInterval(timer);
    if(maybeRender(window.openai&&window.openai.globals&&window.openai.globals.toolOutput))return clearInterval(timer);
    if(attempts>=80)clearInterval(timer);
  },100);
}
var initRequestId=null;
function initializeHostBridge(){
  initRequestId=Date.now();
  window.parent.postMessage({
    jsonrpc:"2.0",
    id:initRequestId,
    method:"ui/initialize",
    params:{
      appInfo:{name:"homecare-widget",version:"1.0.0"},
      appCapabilities:{},
      protocolVersion:"2026-01-26"
    }
  },"*");
}
window.addEventListener("message",function(e){
  var m=e.data;
  if(typeof m==="string"){
    try{m=JSON.parse(m);}catch(_){return;}
  }
  if(!m)return;
  if(m.id===initRequestId&&m.result){
    window.parent.postMessage({jsonrpc:"2.0",method:"ui/notifications/initialized"},"*");
  }
  if(m.jsonrpc&&m.jsonrpc!=="2.0")return;
  maybeRender(m);
},{passive:true});
hydrateFromHost();
initializeHostBridge();
function renderTable(rows,cols){
  var html='<table><thead><tr>';
  cols.forEach(function(c){html+='<th>'+c.label+'</th>';});
  html+='</tr></thead><tbody>';
  if(!rows||!rows.length){
    html+='<tr><td class="muted" colspan="'+cols.length+'">No data</td></tr>';
  }else{
    rows.forEach(function(r){
      html+='<tr>';
      cols.forEach(function(c){html+='<td>'+nvl(r[c.key])+'</td>';});
      html+='</tr>';
    });
  }
  html+='</tbody></table>';
  return html;
}
function render(data){
  document.getElementById("loading").style.display="none";
  document.getElementById("content").style.display="block";
  var patient=data.patient||{};
  var risk=data.risk||"UNASSESSED";
  document.getElementById("title").textContent="Patient Profile — "+(patient.patient_id||"");
  document.getElementById("risk-pill").textContent=risk;
  var subtitleParts=[
    "Sex: "+nvl(patient.sex),
    "Year of birth: "+nvl(patient.year_of_birth),
    "Payer: "+nvl(patient.insurance_type),
    "Chronic: "+((data.chronic_conditions||[]).join(", ")||"None")
  ];
  document.getElementById("subtitle").textContent=subtitleParts.join(" · ");
  var flags=data.flags||[];
  var flagsDiv=document.getElementById("flags");
  flagsDiv.innerHTML="";
  if(!flags.length){
    flagsDiv.innerHTML='<span class="flag">No urgent clinical flags detected</span>';
  }else{
    flags.forEach(function(f){
      var span=document.createElement("span");
      span.className="flag";
      span.textContent=f;
      flagsDiv.appendChild(span);
    });
  }
  document.getElementById("labs").innerHTML=renderTable(
    data.labs||[],
    [
      {key:"lab_date",label:"Date"},
      {key:"lab_name",label:"Lab"},
      {key:"lab_result",label:"Result"},
      {key:"units",label:"Units"}
    ]
  );
  document.getElementById("meds").innerHTML=renderTable(
    data.medications||[],
    [
      {key:"medication_name",label:"Medication"},
      {key:"med_start",label:"Start"},
      {key:"med_end",label:"End"},
      {key:"dose",label:"Dose"},
      {key:"route",label:"Route"}
    ]
  );
  document.getElementById("encounters").innerHTML=renderTable(
    data.encounters||[],
    [
      {key:"encounter_date",label:"Date"},
      {key:"encounter_type",label:"Type"},
      {key:"facility_type",label:"Facility"},
      {key:"primary_dx_code",label:"Primary DX"},
      {key:"discharge_status",label:"Discharge"}
    ]
  );
}
function nvl(v){return v==null?"—":v}
</script>
</body>
</html>
