<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#e6edf3;padding:16px;line-height:1.5}
h2{font-size:16px;font-weight:600;margin-bottom:6px;color:#f0f6fc}
h3{font-size:13px;font-weight:600;margin:14px 0 6px;color:#c9d1d9;text-transform:uppercase;letter-spacing:.08em}
.subtitle{font-size:12px;color:#8b949e;margin-bottom:12px}
.section{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin-bottom:12px}
.row{display:flex;gap:8px;align-items:center}
.pill{font-size:11px;padding:2px 8px;border-radius:10px;background:#1f3a5f;color:#58a6ff;text-transform:uppercase;letter-spacing:.5px}
.meta{font-size:12px;color:#8b949e;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
th,td{padding:6px 8px;border-bottom:1px solid #30363d;text-align:left;vertical-align:top}
th{color:#c9d1d9;font-weight:600}
.muted{color:#8b949e}
#loading{text-align:center;padding:40px;color:#8b949e}
</style>
</head>
<body>
<h2>Care Gap Closure Plan (Step 1b)</h2>
<p class="subtitle" id="subtitle">Waiting for results...</p>
<div id="loading">Building care gaps...</div>
<div id="sections"></div>
<script>
function extractData(payload){
  if(!payload)return null;
  if(typeof payload==="string"){
    try{return extractData(JSON.parse(payload));}catch(_){return null;}
  }
  if(typeof payload!=="object")return null;
  if(payload.structuredContent)return payload.structuredContent;
  if(payload._meta)return extractData(payload._meta);
  if(payload.toolOutput)return extractData(payload.toolOutput);
  if(payload.toolResponseMetadata)return extractData(payload.toolResponseMetadata);
  if(payload.result)return extractData(payload.result);
  if(payload.params)return extractData(payload.params);
  if(payload.arguments)return extractData(payload.arguments);
  if(payload.globals&&payload.globals.toolOutput)return extractData(payload.globals.toolOutput);
  if(payload.jsonrpc||payload.method)return null;
  return payload;
}
function maybeRender(payload){
  var data=extractData(payload);
  if(!data)return false;
  render(data);
  return true;
}
function hydrateFromHost(){
  if(maybeRender(window.openai&&window.openai.toolOutput))return;
  if(maybeRender(window.openai&&window.openai.toolResponseMetadata))return;
  if(maybeRender(window.openai&&window.openai.globals&&window.openai.globals.toolOutput))return;
  var attempts=0;
  var timer=setInterval(function(){
    attempts+=1;
    if(maybeRender(window.openai&&window.openai.toolOutput))return clearInterval(timer);
    if(maybeRender(window.openai&&window.openai.toolResponseMetadata))return clearInterval(timer);
    if(maybeRender(window.openai&&window.openai.globals&&window.openai.globals.toolOutput))return clearInterval(timer);
    if(attempts>=80)clearInterval(timer);
  },100);
}
var initRequestId=null;
function initializeHostBridge(){
  initRequestId=Date.now();
  window.parent.postMessage({
    jsonrpc:"2.0",
    id:initRequestId,
    method:"ui/initialize",
    params:{
      appInfo:{name:"homecare-widget",version:"1.0.0"},
      appCapabilities:{},
      protocolVersion:"2026-01-26"
    }
  },"*");
}
window.addEventListener("message",function(e){
  var m=e.data;
  if(typeof m==="string"){
    try{m=JSON.parse(m);}catch(_){return;}
  }
  if(!m)return;
  if(m.id===initRequestId&&m.result){
    window.parent.postMessage({jsonrpc:"2.0",method:"ui/notifications/initialized"},"*");
  }
  if(m.jsonrpc&&m.jsonrpc!=="2.0")return;
  maybeRender(m);
},{passive:true});
hydrateFromHost();
initializeHostBridge();
function renderTable(rows){
  var html='<table><thead><tr>'+
    '<th>Gap</th><th>Measure ID</th><th>Days overdue</th><th>Next action</th><th>Impact</th><th>Alternate therapy</th>'+
    '</tr></thead><tbody>';
  if(!rows||!rows.length){
    html+='<tr><td class="muted" colspan="6">No actionable gaps identified</td></tr>';
  }else{
    rows.forEach(function(r){
      html+='<tr>'+
        '<td>'+nvl(r.gap_name)+'</td>'+
        '<td>'+nvl(r.gap_id)+'</td>'+
        '<td>'+nvl(r.days_overdue)+'</td>'+
        '<td>'+nvl(r.closure_opportunity)+'</td>'+
        '<td>'+nvl(r.quality_score_impact)+'</td>'+
        '<td>'+(r.alternate_therapy_flag?"Yes":"No")+'</td>'+
      '</tr>';
    });
  }
  html+='</tbody></table>';
  return html;
}
function render(data){
  var patients=data.patients||[];
  document.getElementById("loading").style.display="none";
  document.getElementById("subtitle").textContent="Generated plans for "+patients.length+" patient(s)";
  var sections=document.getElementById("sections");
  sections.innerHTML="";
  patients.forEach(function(p){
    var section=document.createElement("div");
    section.className="section";
    var patient=p.patient||{};
    var reasons=(patient.severity_reasons||[]).join("; ");
    section.innerHTML=
      '<div class="row">'+
        '<strong>'+esc(patient.patient_id)+'</strong> '+
        '<span class="pill">'+esc(patient.risk_tier||"LOW")+'</span>'+
      '</div>'+
      '<div class="meta">Focus areas: '+(reasons?esc(reasons):"—")+'</div>'+
      renderTable(p.gaps||[]);
    sections.appendChild(section);
  });
}
function esc(s){if(!s)return"—";var d=document.createElement("span");d.textContent=s;return d.innerHTML}
function nvl(v){return v==null?"—":v}
</script>
</body>
</html>
