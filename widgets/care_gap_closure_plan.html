<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#e6edf3;padding:16px;line-height:1.5}
h1{font-size:18px;font-weight:600;margin-bottom:8px;color:#f0f6fc}
.subtitle{font-size:13px;color:#8b949e;margin-bottom:16px}
.panel{background:#161b22;border:1px solid #30363d;border-radius:8px;margin-bottom:16px;overflow:hidden}
.panel-header{padding:14px 16px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.panel-header h2{font-size:15px;color:#58a6ff}
.tags{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.tag{padding:3px 8px;border-radius:999px;border:1px solid #484f58;color:#8b949e;background:#1c1f26}
.tag-alt{border-color:#ff9b9c;color:#ff9b9c;background:#341921}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #30363d}
th{color:#8b949e;font-weight:500;text-transform:uppercase;letter-spacing:.4px;font-size:11px}
tbody tr:last-child td{border-bottom:none}
.empty{text-align:center;padding:28px;color:#8b949e}
#loading{text-align:center;padding:40px;color:#8b949e}
</style>
</head>
<body>
<h1>Care Gap Closure Plan</h1>
<p class="subtitle" id="subtitle">Waiting for prioritized gaps…</p>
<div id="loading">Loading care gap details…</div>
<div id="panels"></div>
<script>
function extractData(payload){
  if(!payload)return null;
  if(typeof payload==="string"){
    try{return extractData(JSON.parse(payload));}catch(_){return null;}
  }
  if(payload.structuredContent)return payload.structuredContent;
  if(payload._meta)return extractData(payload._meta);
  if(payload.toolOutput)return extractData(payload.toolOutput);
  if(payload.toolResponseMetadata)return extractData(payload.toolResponseMetadata);
  if(payload.result)return extractData(payload.result);
  if(payload.params)return extractData(payload.params);
  if(payload.arguments)return extractData(payload.arguments);
  if(payload.globals&&payload.globals.toolOutput)return extractData(payload.globals.toolOutput);
  if(payload.jsonrpc||payload.method)return null;
  return payload;
}
function maybeRender(payload){
  const data=extractData(payload);
  if(!data)return false;
  render(data);
  return true;
}
function hydrateFromHost(){
  if(maybeRender(window.openai&&window.openai.toolOutput))return;
  if(maybeRender(window.openai&&window.openai.toolResponseMetadata))return;
  if(maybeRender(window.openai&&window.openai.globals&&window.openai.globals.toolOutput))return;
  let attempts=0;
  const timer=setInterval(()=>{
    attempts+=1;
    if(maybeRender(window.openai&&window.openai.toolOutput))return clearInterval(timer);
    if(maybeRender(window.openai&&window.openai.toolResponseMetadata))return clearInterval(timer);
    if(maybeRender(window.openai&&window.openai.globals&&window.openai.globals.toolOutput))return clearInterval(timer);
    if(attempts>=60)clearInterval(timer);
  },120);
}
let initRequestId=null;
function initializeHostBridge(){
  initRequestId=Date.now();
  window.parent.postMessage({
    jsonrpc:"2.0",
    id:initRequestId,
    method:"ui/initialize",
    params:{
      appInfo:{name:"homecare-cohort",version:"1.0.0"},
      appCapabilities:{},
      protocolVersion:"2026-01-26"
    }
  },"*");
}
window.addEventListener("message",event=>{
  let m=event.data;
  if(typeof m==="string"){try{m=JSON.parse(m);}catch(_){return;}}
  if(!m)return;
  if(m.id===initRequestId&&m.result){
    window.parent.postMessage({jsonrpc:"2.0",method:"ui/notifications/initialized"},"*");
  }
  if(m.jsonrpc&&m.jsonrpc!=="2.0")return;
  maybeRender(m);
},{passive:true});
window.addEventListener("openai:set_globals",e=>maybeRender(e&&e.detail),{passive:true});
window.addEventListener("openai:setGlobals",e=>maybeRender(e&&e.detail),{passive:true});
hydrateFromHost();
initializeHostBridge();
function render(data){
  document.getElementById("loading").hidden=true;
  const panels=document.getElementById("panels");
  panels.innerHTML="";
  const patients=(data.patients||[]).map(entry=>({
    info:entry.patient||entry.info||{},
    gaps:entry.gaps||[]
  }));
  if(!patients.length){
    panels.innerHTML='<div class="empty">No actionable gaps identified.</div>';
    document.getElementById("subtitle").textContent="No patients available.";
    return;
  }
  document.getElementById("subtitle").textContent=`Generated plan for ${patients.length} patient(s).`;
  patients.forEach(({info,gaps})=>{
    const panel=document.createElement("div");
    panel.className="panel";
    const header=document.createElement("div");
    header.className="panel-header";
    header.innerHTML=[
      `<h2>${escapeHtml(info.patient_id||"Unknown")}</h2>`,
      `<div class="tags">
          <span class="tag">Risk ${escapeHtml(info.risk_tier||"—")}</span>
          ${info.primary_dx_code?`<span class="tag">DX ${escapeHtml(info.primary_dx_code)}</span>`:""}
          ${info.composite_risk_score!=null?`<span class="tag">Score ${escapeHtml(info.composite_risk_score)}</span>`:""}
        </div>`
    ].join("");
    panel.appendChild(header);
    const table=document.createElement("table");
    const thead=document.createElement("thead");
    const tr=document.createElement("tr");
    ["Gap","Measure ID","Days overdue","Next action","Quality impact","Alt therapy"].forEach(text=>{
      const th=document.createElement("th");
      th.textContent=text;
      tr.appendChild(th);
    });
    thead.appendChild(tr);
    table.appendChild(thead);
    const tbody=document.createElement("tbody");
    if(!gaps.length){
      const emptyRow=document.createElement("tr");
      const emptyCell=document.createElement("td");
      emptyCell.textContent="No actionable gaps.";
      emptyCell.colSpan=6;
      emptyCell.style.textAlign="center";
      emptyRow.appendChild(emptyCell);
      tbody.appendChild(emptyRow);
    }else{
      gaps.forEach(gap=>{
        const row=document.createElement("tr");
        row.innerHTML=[
          `<td>${escapeHtml(gap.gap_name||"—")}</td>`,
          `<td>${escapeHtml(gap.gap_id||"—")}</td>`,
          `<td>${gap.days_overdue==null?"—":gap.days_overdue}</td>`,
          `<td>${escapeHtml(gap.closure_opportunity||"—")}</td>`,
          `<td>${escapeHtml(gap.quality_score_impact||"—")}</td>`,
          `<td>${gap.alternate_therapy_flag?'<span class="tag tag-alt">Yes</span>':'No'}</td>`
        ].join("");
        tbody.appendChild(row);
      });
    }
    table.appendChild(tbody);
    panel.appendChild(table);
    panels.appendChild(panel);
  });
}
function escapeHtml(str){
  return String(str==null?"":str).replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[s]));
}
</script>
</body>
</html>
