<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#e6edf3;padding:16px;line-height:1.5}
h2{font-size:16px;font-weight:600;margin-bottom:6px;color:#f0f6fc}
h3{font-size:13px;font-weight:600;margin:16px 0 6px;color:#c9d1d9;text-transform:uppercase;letter-spacing:.08em}
.subtitle{font-size:12px;color:#8b949e;margin-bottom:14px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px}
.card-title{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.08em}
.card-value{font-size:20px;font-weight:600;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.panel{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:6px 8px;border-bottom:1px solid #30363d;text-align:left}
th{color:#c9d1d9;font-weight:600}
.muted{color:#8b949e}
#loading{text-align:center;padding:40px;color:#8b949e}
</style>
</head>
<body>
<h2>Cohort Snapshot</h2>
<p class="subtitle" id="subtitle">Waiting for results...</p>
<div id="loading">Loading cohort metrics...</div>
<div class="cards" id="summary-cards"></div>
<div class="grid" id="tables"></div>
<script>
function extractData(payload){
  if(!payload)return null;
  if(typeof payload==="string"){
    try{return extractData(JSON.parse(payload));}catch(_){return null;}
  }
  if(typeof payload!=="object")return null;
  if(payload.structuredContent)return payload.structuredContent;
  if(payload._meta)return extractData(payload._meta);
  if(payload.toolOutput)return extractData(payload.toolOutput);
  if(payload.toolResponseMetadata)return extractData(payload.toolResponseMetadata);
  if(payload.result)return extractData(payload.result);
  if(payload.params)return extractData(payload.params);
  if(payload.arguments)return extractData(payload.arguments);
  if(payload.globals&&payload.globals.toolOutput)return extractData(payload.globals.toolOutput);
  if(payload.jsonrpc||payload.method)return null;
  return payload;
}
function maybeRender(payload){
  var data=extractData(payload);
  if(!data)return false;
  render(data);
  return true;
}
function hydrateFromHost(){
  if(maybeRender(window.openai&&window.openai.toolOutput))return;
  if(maybeRender(window.openai&&window.openai.toolResponseMetadata))return;
  if(maybeRender(window.openai&&window.openai.globals&&window.openai.globals.toolOutput))return;
  var attempts=0;
  var timer=setInterval(function(){
    attempts+=1;
    if(maybeRender(window.openai&&window.openai.toolOutput))return clearInterval(timer);
    if(maybeRender(window.openai&&window.openai.toolResponseMetadata))return clearInterval(timer);
    if(maybeRender(window.openai&&window.openai.globals&&window.openai.globals.toolOutput))return clearInterval(timer);
    if(attempts>=80)clearInterval(timer);
  },100);
}
var initRequestId=null;
function initializeHostBridge(){
  initRequestId=Date.now();
  window.parent.postMessage({
    jsonrpc:"2.0",
    id:initRequestId,
    method:"ui/initialize",
    params:{
      appInfo:{name:"homecare-widget",version:"1.0.0"},
      appCapabilities:{},
      protocolVersion:"2026-01-26"
    }
  },"*");
}
window.addEventListener("message",function(e){
  var m=e.data;
  if(typeof m==="string"){
    try{m=JSON.parse(m);}catch(_){return;}
  }
  if(!m)return;
  if(m.id===initRequestId&&m.result){
    window.parent.postMessage({jsonrpc:"2.0",method:"ui/notifications/initialized"},"*");
  }
  if(m.jsonrpc&&m.jsonrpc!=="2.0")return;
  maybeRender(m);
},{passive:true});
hydrateFromHost();
initializeHostBridge();
function renderCard(title,value){
  var div=document.createElement("div");
  div.className="card";
  div.innerHTML='<div class="card-title">'+title+'</div><div class="card-value">'+value+'</div>';
  return div;
}
function renderTable(title,rows,cols){
  var panel=document.createElement("div");
  panel.className="panel";
  var html='<h3>'+title+'</h3><table><thead><tr>';
  cols.forEach(function(c){html+='<th>'+c+'</th>';});
  html+='</tr></thead><tbody>';
  if(!rows||!rows.length){
    html+='<tr><td class="muted" colspan="'+cols.length+'">No data</td></tr>';
  }else{
    rows.forEach(function(r){
      html+='<tr>';
      cols.forEach(function(c){html+='<td>'+nvl(r[c])+'</td>';});
      html+='</tr>';
    });
  }
  html+='</tbody></table>';
  panel.innerHTML=html;
  return panel;
}
function render(data){
  document.getElementById("loading").style.display="none";
  var subtitle=document.getElementById("subtitle");
  subtitle.textContent="Window: last "+nvl(data.window_days)+" days";
  var cards=document.getElementById("summary-cards");
  cards.innerHTML="";
  cards.appendChild(renderCard("Total Patients",nvl(data.totals&&data.totals.patients)));
  cards.appendChild(renderCard("High Risk",countTier(data.risk_breakdown,"HIGH")));
  cards.appendChild(renderCard("Medium Risk",countTier(data.risk_breakdown,"MEDIUM")));
  cards.appendChild(renderCard("Low Risk",countTier(data.risk_breakdown,"LOW")));
  var tables=document.getElementById("tables");
  tables.innerHTML="";
  tables.appendChild(renderTable("Risk Distribution",data.risk_breakdown||[],["risk_tier","patients"]));
  tables.appendChild(renderTable("Chronic Conditions",data.condition_counts||[],["condition","patients"]));
  tables.appendChild(renderTable("Payer Mix",data.payer_mix||[],["payer","patients"]));
  tables.appendChild(renderTable("Recent Acute Encounters",data.recent_acute_encounters||[],["encounter_type","encounters","unique_patients"]));
}
function countTier(rows,tier){
  if(!rows)return "0";
  var row=rows.find(function(r){return (r.risk_tier||"").toUpperCase()===tier;});
  return row?row.patients:"0";
}
function nvl(v){return v==null?"—":v}
</script>
</body>
</html>
